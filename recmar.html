<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>REDLINE // DATA_FEED // RECMAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff003c; --black: #050505; }
        body { 
            margin: 0; background: var(--black); color: white; 
            font-family: 'JetBrains Mono', monospace;
            display: flex; height: 100vh; overflow: hidden;
        }

        /* --- Left Side: Visual Feed --- */
        .visual-feed {
            flex: 1.2; border-right: 1px solid var(--red);
            position: relative; overflow: hidden;
            background: #000;
        }

        #game-video {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0.7; filter: saturate(1.5) contrast(1.1);
        }

        /* A unique "Targeting" overlay for Recmar */
        .target-overlay {
            position: absolute; top: 50%; left: 50%;
            width: 300px; height: 300px;
            border: 1px solid rgba(255, 0, 60, 0.3);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
        }
        .target-overlay::before {
            content: ''; position: absolute; top: -10px; left: 50%; width: 2px; height: 20px; background: var(--red); transform: translateX(-50%);
        }

        .scan-line {
            position: absolute; top: 0; width: 100%; height: 2px;
            background: rgba(255, 0, 60, 0.3);
            z-index: 10;
            animation: scan 4s linear infinite;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* --- Right Side: Data Feed --- */
        .data-feed {
            flex: 1; padding: 60px; display: flex; flex-direction: column;
            background: linear-gradient(135deg, #0a0002 0%, #050505 100%);
            overflow-y: auto;
        }

        .game-header { border-left: 5px solid var(--red); padding-left: 20px; margin-bottom: 40px; }
        .game-header h2 { font-family: 'Orbitron'; font-size: 2.5rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .spec-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid #222; padding: 30px;
            position: relative; margin-bottom: 20px;
        }
        .spec-box::before {
            content: "ARENA_SIMULATION_LOG"; position: absolute; top: -10px; left: 10px;
            background: #080001; color: var(--red); font-size: 0.6rem; padding: 0 5px;
        }

        .info-label { color: var(--red); font-size: 0.7rem; margin-top: 15px; display: block; letter-spacing: 2px; }
        .info-value { font-weight: bold; font-size: 1rem; margin-bottom: 10px; line-height: 1.6; }
        .placeholder-text { color: #444; font-style: italic; font-size: 0.85rem; }

        .btn-container { margin-top: auto; padding-top: 30px; }
        .play-btn {
            display: block; width: 100%; padding: 25px; background: var(--red);
            border: none; color: white; font-family: 'Orbitron';
            font-size: 1.2rem; font-weight: 900; cursor: pointer;
            clip-path: polygon(0 0, 100% 0, 93% 100%, 0 100%);
            transition: 0.3s; text-align: center; text-decoration: none;
        }

        .play-btn:hover { background: #fff; color: var(--red); letter-spacing: 5px; }
        .play-btn.disabled { background: #222; color: #444; cursor: not-allowed; }

        .back-link {
            display: inline-block; margin-top: 20px; color: #555; 
            text-decoration: none; font-size: 0.8rem;
        }
        .back-link:hover { color: var(--red); }
    </style>
</head>
<body>

    <div class="visual-feed">
        <div class="target-overlay"></div>
        <div class="scan-line"></div>
        <video id="game-video" autoplay muted loop playsinline>
            <source src="Recmar.mp4" type="video/mp4">
        </video>
    </div>

    <div class="data-feed">
        <div class="game-header">
            <h2 id="title">RECMAR</h2>
            <p id="subtitle" style="color:var(--red); margin: 5px 0 0 0;">HARI_NG_MANOK // COCKPIT_SIM</p>
        </div>

        <div class="spec-box">
            <span class="info-label">DEVELOPMENT_CORE</span>
            <div id="dev" class="info-value">
                <span class="placeholder-text">[WAITING_FOR_UPLINK... DATA_PENDING]</span>
            </div>

            <span class="info-label">MISSION_OBJECTIVE</span>
            <div id="desc" class="info-value">The ultimate cockpit simulation. Train your champion, dominate the pit, and become the legend of the arena.</div>
            
            <span class="info-label">SYSTEM_STATUS</span>
            <div class="info-value" style="color: #ffaa00;">AWAITING_STABLE_BUILD_VERSION_1.0</div>
        </div>

        <div class="btn-container">
            <a href="#" class="play-btn disabled">SYSTEM_OFFLINE</a>
            <a href="index.html" class="back-link">_RETURN_TO_HUB</a>
        </div>
    </div>

</body>
</html>
